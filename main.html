<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인폼</title>
    <link href="css/main.css" rel="stylesheet">
</head>
<body>
    <div id="form">
        <div class="left">
            <h3>안녕하세요<br />반응형웹디자인반입니다.</h3>
            <p>회원 서비스 이용을 위해 로그인 해주세요.</p>

            <div class="join">
                <p>아직 회원이 아니시면 회원가입 해주세요.</p>
                <button>회원가입</button>
            </div>
        </div><!--.left end-->

        <div class="right">
            <form>
                <h2>Sign In</h2>
                <fieldset>
                    <legend>로그인페이지</legend>
                    <div>
                        <label for="id">아이디</label>
                        <input type="text" id="id" placeholder="아이디" />
                    </div>
                    <div>
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" placeholder="비밀번호" />
                    </div>
                    <div class="idpw_search">
                        <a href="#">아이디 / 비밀번호 찾기</a>
                    </div>
                    <button  onclick="location.href='signupform.html'" class="login">로그인하기</button>
                    <div class="sns_login">
                        <button>네이버 로그인</button>
                        <button>카카오톡 로그인</button>
                        <button>인스타그램 로그인</button>
                    </div>
                </fiedlset>
            </form>
        </div><!--.right end-->
    </div>
</body>
</html>
